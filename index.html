<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #0f0;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0f0;
        }

        #gameWindow {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #001;
            border: 2px solid #0f0;
            overflow: hidden;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            bottom: 20px;
            left: 380px;
            background-color: #0f0;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }

        .bullet {
            position: absolute;
            width: 5px;
            height: 15px;
            background-color: #ff0;
            box-shadow: 0 0 5px #ff0;
        }

        .enemy {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #f00;
            border-radius: 50%;
            box-shadow: 0 0 10px #f00;
        }

        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 18px;
            z-index: 10;
        }

        #health {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-size: 18px;
            z-index: 10;
        }

        #gameOverScreen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
        }

        #gameOverScreen h2 {
            color: #f00;
            font-size: 48px;
            margin-bottom: 20px;
        }

        #gameOverScreen p {
            color: #0f0;
            font-size: 24px;
            margin-bottom: 20px;
        }

        #gameOverScreen button {
            padding: 10px 30px;
            font-size: 18px;
            background-color: #0f0;
            color: #000;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        #gameOverScreen button:hover {
            background-color: #0cc;
        }

        .controls {
            color: #0f0;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🎮 SHOOTING GAME 🎮</h1>
    
    <div id="gameWindow">
        <div id="score">Score: 0</div>
        <div id="health">HP: 100/100</div>
        <div id="player"></div>
        <div id="gameOverScreen">
            <h2>GAME OVER</h2>
            <p id="finalScore">Score: 0</p>
            <button onclick="location.reload()">Restart</button>
        </div>
    </div>

    <div class="controls">
        <p>← → キーで移動 | スペースキーで発射 | Rキーでリセット</p>
    </div>

    <script>
        const gameWindow = document.getElementById('gameWindow');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const healthDisplay = document.getElementById('health');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreDisplay = document.getElementById('finalScore');

        // ゲーム状態
        const game = {
            playerX: 380,
            playerY: 540,
            playerWidth: 40,
            playerHeight: 40,
            playerSpeed: 7,
            health: 100,
            maxHealth: 100,
            score: 0,
            gameActive: true,
            bullets: [],
            enemies: []
        };

        let keys = {};

        // キー入力
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ') {
                e.preventDefault();
                shoot();
            }
            if (e.key.toLowerCase() === 'r') {
                resetGame();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // プレイヤー移動
        function movePlayer() {
            if (keys['ArrowLeft'] && game.playerX > 0) {
                game.playerX -= game.playerSpeed;
            }
            if (keys['ArrowRight'] && game.playerX < 800 - game.playerWidth) {
                game.playerX += game.playerSpeed;
            }
            player.style.left = game.playerX + 'px';
            player.style.bottom = (600 - game.playerY - game.playerHeight) + 'px';
        }

        // 発射
        function shoot() {
            if (!game.gameActive) return;
            game.bullets.push({
                x: game.playerX + game.playerWidth / 2 - 2.5,
                y: game.playerY - 30,
                width: 5,
                height: 15,
                speed: 10
            });
        }

        // 敵生成
        function spawnEnemy() {
            if (!game.gameActive) return;
            game.enemies.push({
                x: Math.random() * (800 - 40),
                y: 0,
                width: 40,
                height: 40,
                speed: 3 + game.score / 200
            });
        }

        // 衝突判定
        function checkCollision(obj1, obj2) {
            return obj1.x < obj2.x + obj2.width &&
                   obj1.x + obj1.width > obj2.x &&
                   obj1.y < obj2.y + obj2.height &&
                   obj1.y + obj1.height > obj2.y;
        }

        // ゲーム更新
        function update() {
            if (!game.gameActive) return;

            movePlayer();

            // 弾の更新
            for (let i = game.bullets.length - 1; i >= 0; i--) {
                game.bullets[i].y -= game.bullets[i].speed;

                if (game.bullets[i].y < 0) {
                    game.bullets.splice(i, 1);
                    continue;
                }

                // 敵との衝突
                for (let j = game.enemies.length - 1; j >= 0; j--) {
                    if (checkCollision(game.bullets[i], game.enemies[j])) {
                        game.bullets.splice(i, 1);
                        game.enemies.splice(j, 1);
                        game.score += 10;
                        scoreDisplay.textContent = 'Score: ' + game.score;
                        break;
                    }
                }
            }

            // 敵の更新
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                game.enemies[i].y += game.enemies[i].speed;

                // プレイヤーとの衝突
                if (checkCollision(game.enemies[i], { x: game.playerX, y: game.playerY, width: game.playerWidth, height: game.playerHeight })) {
                    game.health -= 20;
                    healthDisplay.textContent = 'HP: ' + game.health + '/' + game.maxHealth;
                    game.enemies.splice(i, 1);

                    if (game.health <= 0) {
                        endGame();
                    }
                    continue;
                }

                // 画面外
                if (game.enemies[i].y > 600) {
                    game.enemies.splice(i, 1);
                }
            }
        }

        // 描画
        function draw() {
            // 弾を描画
            const oldBullets = document.querySelectorAll('.bullet');
            oldBullets.forEach(b => b.remove());

            game.bullets.forEach(bullet => {
                const bulletEl = document.createElement('div');
                bulletEl.className = 'bullet';
                bulletEl.style.left = bullet.x + 'px';
                bulletEl.style.top = bullet.y + 'px';
                gameWindow.appendChild(bulletEl);
            });

            // 敵を描画
            const oldEnemies = document.querySelectorAll('.enemy');
            oldEnemies.forEach(e => e.remove());

            game.enemies.forEach(enemy => {
                const enemyEl = document.createElement('div');
                enemyEl.className = 'enemy';
                enemyEl.style.left = enemy.x + 'px';
                enemyEl.style.top = enemy.y + 'px';
                gameWindow.appendChild(enemyEl);
            });
        }

        // ゲーム終了
        function endGame() {
            game.gameActive = false;
            gameOverScreen.style.display = 'flex';
            finalScoreDisplay.textContent = 'Score: ' + game.score;
        }

        // リセット
        function resetGame() {
            game.playerX = 380;
            game.playerY = 540;
            game.health = 100;
            game.score = 0;
            game.gameActive = true;
            game.bullets = [];
            game.enemies = [];
            gameOverScreen.style.display = 'none';
            scoreDisplay.textContent = 'Score: 0';
            healthDisplay.textContent = 'HP: 100/100';
        }

        // ゲームループ
        let spawnTimer = 0;
        function gameLoop() {
            update();
            draw();

            spawnTimer++;
            if (spawnTimer > 40) {
                spawnEnemy();
                spawnTimer = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
